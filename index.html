    <style>
      :root {
        /* 可愛科技配色 */
        --code-blue: #8fb49d;  
        --science-yellow: #fbb376; 
      }

      body {
        margin: 0;
        background-color: white;
      }

      #root-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: white;
        z-index: 99999;
        transition: opacity 0.5s ease;
        pointer-events: none;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      /* =========================================
        2. 可愛符號動畫 (Code & Science Bounce)
         ========================================= */
      .viz-container {
        display: flex;
        gap: 30px;
        margin-bottom: 40px;
        align-items: flex-end;
      }

      .bounce-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* 共通彈跳動畫 */
      .symbol-item {
        width: 50px;
        height: 50px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        font-size: 24px;
        border-radius: 15px;
        animation: cute-bounce 1s infinite ease-in-out;
        position: relative;
      }

      /* Code 符號 < /> */
      .code-sym {
        background-color: #fff;
        border: 4px solid var(--code-blue);
        color: var(--code-blue);
        animation-delay: 0.1s;
      }

      /* 科學符號 ⚛ */
      .sci-sym {
        background-color: #fff;
        border: 4px solid var(--science-yellow);
        color: var(--science-yellow);
        font-size: 30px;
        animation-delay: 0.3s;
      }

      /* Q彈陰影 */
      .symbol-shadow {
        width: 40px;
        height: 6px;
        background: rgba(0,0,0,0.06);
        border-radius: 50%;
        margin-top: 10px;
        animation: shadow-scaling 1s infinite ease-in-out;
      }

      .code-shadow { animation-delay: 0.1s; }
      .sci-shadow { animation-delay: 0.3s; }

      /* =========================================
        3. 狀態文字
         ========================================= */
      .status-text {
        font-size: 14px;
        letter-spacing: 3px;
        color: #333333;
        font-weight: 600;
        text-transform: uppercase;
      }

      /* 文字旁的閃爍星星 */
      .status-text::before,
      .status-text::after {
        content: '✨';
        animation: star-blink 1.5s infinite alternate;
      }

      .dots {
        display: inline-block;
        width: 20px;
      }

      /* =========================================
        4. 動畫定義 (Animations)
         ========================================= */
      @keyframes cute-bounce {
        0%, 100% { transform: translateY(0) scale(1, 1); }
        30% { transform: translateY(-35px) scale(0.9, 1.1); } /* 向上彈起伸長 */
        50% { transform: translateY(0) scale(1.15, 0.85); }   /* 落地壓扁 */
        70% { transform: translateY(-8px) scale(1, 1); }      /* 小回彈 */
      }

      @keyframes shadow-scaling {
        0%, 100% { transform: scale(1); opacity: 1; }
        30% { transform: scale(0.5); opacity: 0.2; }
        50% { transform: scale(1.3); opacity: 0.8; }
      }

      @keyframes star-blink {
        0% { opacity: 0; transform: scale(0.8); }
        100% { opacity: 1; transform: scale(1); }
      }

    </style>
    <script type="module" crossorigin src="/personal-portfolio-react/assets/index-DMQCyQvE.js"></script>
    <link rel="stylesheet" crossorigin href="/personal-portfolio-react/assets/index-BH18YceD.css">

  <body>
    <div id="root">
      <div id="root-loading">
        <div class="viz-container">
          <div class="bounce-wrapper">
            <div class="symbol-item code-sym">&lt;/&gt;</div>
            <div class="symbol-shadow code-shadow"></div>
          </div>
          
          <div class="bounce-wrapper">
            <div class="symbol-item sci-sym">⚛</div>
            <div class="symbol-shadow sci-shadow"></div>
          </div>
        </div>
        
        <div class="status-text">
          Translating<span class="dots">...</span>
        </div>
      </div>
    </div>


    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const loader = document.getElementById('root-loading');
        if (loader) {
          setTimeout(() => {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 600);
          }, 2000); 
        }
      });
    </script>
  </body>
